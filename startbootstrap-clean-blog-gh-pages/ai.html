<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Joke Generator</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #ffb6d9, #ffcce6);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      background: white;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
      text-align: center;
      max-width: 550px;
      width: 100%;
    }

    h1 {
      color: #333;
      margin-bottom: 20px;
      font-size: 2rem;
    }

    p {
      font-size: 1.2rem;
      color: #555;
      margin: 15px 0;
      min-height: 40px;
      transition: all 0.3s ease;
    }

    button {
      background: #ff69b4;
      color: white;
      border: none;
      padding: 15px 30px;
      font-size: 1rem;
      border-radius: 10px;
      cursor: pointer;
      margin-top: 20px;
      transition: background 0.3s ease, transform 0.2s ease;
    }

    button:hover {
      background: #e754a3;
      transform: scale(1.05);
    }

    button:active {
      transform: scale(0.98);
    }

    .label {
      font-weight: bold;
      color: #ff4f9a;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>😂 Joke Generator</h1>
    
    <p><span class="label">Question:</span></p>
    <p id="questionText">Click the button to get started!</p>

    <p><span class="label">Answer:</span></p>
    <p id="answerText"></p>

    <button onclick="generateJoke()">Click Me</button>
  </div>

  <script>
    const jokes = [
      {
        question: "Why don’t skeletons fight each other?",
        answer: "Because they don’t have the guts."
      },
      {
        question: "Why did the scarecrow win an award?",
        answer: "Because he was outstanding in his field."
      },
      {
        question: "What do you call fake spaghetti?",
        answer: "An impasta."
      },
      {
        question: "Why can’t your nose be 12 inches long?",
        answer: "Because then it would be a foot."
      },
      {
        question: "What do you call cheese that isn't yours?",
        answer: "Nacho cheese."
      }
    ];

    let waitingForSecondClick = false;
    let currentJoke = null;

    function generateJoke() {
      const questionText = document.getElementById("questionText");
      const answerText = document.getElementById("answerText");

      if (!waitingForSecondClick) {
        const randomIndex = Math.floor(Math.random() * jokes.length);
        currentJoke = jokes[randomIndex];

        questionText.textContent = currentJoke.question;
        answerText.textContent = "Click again to reveal the answer 💕";
        waitingForSecondClick = true;
      } else {
        answerText.textContent = currentJoke.answer;
        waitingForSecondClick = false;
      }
    }
  </script>

</body>
</html>
